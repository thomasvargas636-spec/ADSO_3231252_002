<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parkalia – Registro Exitoso</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/hu01-style.css"/>
</head>
<body>

  <div class="screen">

    <div class="logo">
      <img src="../../img/Group_2.png" alt="Parkalia Logo" class="logo-img" />
    </div>

    <div class="card text-center">
      <div class="success-icon">✅</div>

      <div class="success-title">¡Cuenta creada!</div>
      <div class="success-desc">
        Tu cuenta ha sido registrada exitosamente. Ya puedes acceder a todas las funciones de Parkalia.
      </div>

      <div class="success-email-wrap">
        <div class="success-email">juan@correo.com</div>
      </div>

      <div class="steps">
        <div class="step done">✓</div>
        <div class="step-line done"></div>
        <div class="step done">✓</div>
        <div class="step-line done"></div>
        <div class="step active">3</div>
      </div>

      <button class="btn-success">Ir a iniciar sesión</button>
    </div>

  </div>

</body>
</html>
