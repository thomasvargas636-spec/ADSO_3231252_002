<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parkalia – Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="screen">

    <div class="logo">
      <img src="Group_2.png" alt="Parkalia Logo" class="logo-img" />
    </div>

    <div class="card">
      <div class="card-title">Crear cuenta</div>
      <div class="card-subtitle">Regístrate para acceder a todas las funciones de la plataforma</div>

      <div class="field-row">
        <div class="field">
          <label>Nombres</label>
          <input type="text" placeholder="ej. Juan" />
        </div>
        <div class="field">
          <label>Apellidos</label>
          <input type="text" placeholder="ej. García" />
        </div>
      </div>

      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" placeholder="ej. juan@correo.com" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="Mínimo 8 caracteres" />
      </div>

      <div class="requirements">
        <div class="req-title">Requisitos de contraseña</div>
        <div class="req-item unmet" id="req-length"><div class="req-dot"></div> Máximo 12 caracteres</div>
        <div class="req-item unmet" id="req-upper"><div class="req-dot"></div> Al menos una mayúscula</div>
        <div class="req-item unmet" id="req-special"><div class="req-dot"></div> Al menos un carácter especial</div>
        <div class="req-item unmet" id="req-alnum"><div class="req-dot"></div> Debe ser alfanumérica</div>
      </div>

      <div class="field">
        <label>Confirmar contraseña</label>
        <input id="confirm-password" type="password" placeholder="Repite tu contraseña" />
      </div>

      <div class="divider"></div>

      <button class="btn-primary" id="btn-register">Crear cuenta</button>

      <div class="login-link">
        ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
