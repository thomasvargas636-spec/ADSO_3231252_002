<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkalia – Pago</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/HU06_style.css">
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="logo-section">
      <img src="img/Group_2.png" alt="parkalia" class="logo-img">
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-group">PRINCIPAL</div>
      <div class="nav-link">📊 Panel de control</div>
      <div class="nav-link">🚗 Vehículos</div>
      <div class="nav-link">⬡ Zonas</div>
      
      <div class="nav-group">ACTIVIDAD</div>
      <div class="nav-link">📋 Reservaciones</div>
      <div class="nav-link active">💳 Pagos</div>
      <div class="nav-link">🕐 Historial</div>
      
      <div class="nav-group">SISTEMA</div>
      <div class="nav-link">👥 Usuarios</div>
      <div class="nav-link">⚙️ Configuración</div>
    </nav>
  </aside>

  <div class="main-content">
    <header class="header-top">
      <h1 class="header-title">Pago Simulado</h1>
    </header>

    <main class="view-container">
      <section class="payment-section">
        <h2 class="view-title">Realizar Pago</h2>
        <p class="view-subtitle">pago para tu reserva activa</p>

        <div class="step-card">
          <div class="step-header">
            <div class="step-badge">1</div>
            <h3 class="step-header-title">Resumen y método de pago</h3>
          </div>

          <div class="step-body">
            <div class="total-box">
              <span class="total-label">Total a pagar</span>
              <span class="total-value">$5.000</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

</body>
</html>
