<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARKALIA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/HU02-style.css">
</head>
<body>

    <div class="screen">
        <div class="logo">
            <img src="../img/image.png" alt="logo" class="logo-img"/>
        </div>

        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Iniciar sesión</h1>
                <p class="card-subtitle">Accede a tu cuenta de forma segura</p>
            </div>
            
            <form id="loginForm">
                <div class="field">
                    <div class="label-row">
                        <label for="email">Correo electrónico</label>
                    </div>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com">
                </div>

                <div class="field">
                    <div class="label-row">
                        <label for="password">Contraseña</label>
                        <a href="../HU-02.1.1/HU-02.1.1-index.html" class="forgot-link">¿Olvidé mi contraseña?</a>
                    </div>
                    <input type="password" id="password" placeholder="********">
                </div>

                <div id="warning-box" class="alert alert-warning hidden"></div>
                <div id="error-box" class="alert alert-danger hidden">
                    Las credenciales no coinciden con ninguna cuenta registrada.
                </div>

                <div class="divider"></div>
                
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </div>
    </div>

    <script src="../js/HU02-script.js"></script>
</body>
</html>
