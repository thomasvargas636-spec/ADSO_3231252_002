<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARKALIA - Correo Enviado</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/HU02.1.3-style.css"/>
</head>
<body>
    <div class="screen">
        <div class="logo">
            <img src="../img/image.png" alt="logo" class="logo-img"/>
        </div>

        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Correo enviado</h1>
                <p class="card-subtitle">Hemos enviado un codigo a tu correo electrónico para restablecer tu contraseña.</p>
            </div>

            <div class="alert alert-info">
                El codigo expirará en <strong>15 minutos</strong>. Si no lo ves, revisa tu carpeta de spam.
            </div>
            <form id="loginForm">
                <div class="field">
                    <label for="email">Codigo de verificación</label>
                    <input type="text" id="code" placeholder="Ingresa el codigo recibido" min="000000" max="999999">
                    <div class="error" id="email-error"></div>
                </div>
                <button type="submit" class="btn-primary">Verificar código</button>
</form>

            

            <div class="divider"></div>
            
            <a href="../HU-02/HU-02-index.html" class="forgot-link">← Volver al inicio de sesión</a>
        </div>
    </div>
    <script src="../js/HU02.1.3.script.js"></script>
</body>
</html>
