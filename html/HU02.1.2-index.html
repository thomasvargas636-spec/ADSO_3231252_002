<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARKALIA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/HU02.1.2-style.css"/>
</head>
<body>

    <div class="screen">
        <div class="logo">
            <img src="../img/image.png" alt="logo" class="logo-img"/>
        </div>

        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Olvidaste tu contraseña</h1>
                <p class="card-subtitle">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña</p>
            </div>
            
            <form id="loginForm">
                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com">
                    <div class="error" id="email-error"></div>
                </div>

                <div class="divider"></div>
                
                <button type="submit" class="btn-primary">Enviar enlace</button>
                
            </form>
        </div>
    </div>

    <script src="../js/HU02.1.2-style.js"></script>
</body>
</html>
