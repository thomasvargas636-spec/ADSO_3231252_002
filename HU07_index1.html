<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cancelación de reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/HU07_style1.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="logo">
        <img src="img/Group_2.png" alt="Logo Parkalia">
      </div>

      <p class="section-title">Principal</p>
      <nav class="menu">
        <a href="#" class="menu-item">📊 Panel de control</a>
        <a href="#" class="menu-item">🚗 Vehículos</a>
        <a href="#" class="menu-item">&#11041; Zonas</a>
      </nav>

      <p class="section-title">Actividad</p>
      <nav class="menu">
        <a href="#" class="menu-item active">📅 Reservaciones</a>
        <a href="#" class="menu-item">💳 Pagos</a>
        <a href="#" class="menu-item">📜 Historial</a>
      </nav>

      <p class="section-title">Sistema</p>
      <nav class="menu">
        <a href="#" class="menu-item">👤 Usuarios</a>
        <a href="#" class="menu-item">⚙️ Configuración</a>
      </nav>

    </aside>

  <div class="main">

    <header class="top-header">
      <h1>Cancelación de reservas</h1>
    </header>

    <section class="content">

      <div class="cards-container">

        <!-- CARD 1 -->
        <div class="card card-lista">

          <div class="card-header">
            <div class="step step-blue">1</div>
            <h2>Seleccionar reserva</h2>
          </div>

          <div class="reservas-container"></div>

        </div>

        <!-- CARD 2 -->
        <div class="card card-confirmacion" style="display:none;">

          <div class="card-header">
            <div class="step step-red">!</div>
            <h2>Confirmar cancelación</h2>
          </div>

          <div class="detalle-reserva"></div>

          <p class="alerta">¿Seguro que deseas cancelar? El cupo será liberado.</p>

          <button class="btn-volver">Volver</button>
          <button class="btn-confirmar">Sí, cancelar</button>

        </div>

        <!-- CARD 3 -->
        <div class="card card-exito" style="display:none;">

          <div class="card-header">
            <div class="step step-green">✔</div>
            <h2>Reserva cancelada</h2>
          </div>

          <div class="mensaje-exito"></div>

          <p class="cupo-liberado"></p>

          <button class="btn-ver-reservas">Ver reservas</button>
          <button class="btn-inicio">Inicio</button>

        </div>

      </div>

    </section>

  </div>

</div>

<script src="js/HU07_script1.js"></script>

</body>
</html>
